<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/src/styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tauri App</title>
  <script type="module" src="/src/main.ts" defer></script>
</head>

<body>
  <div class="window-drag">
  <main class="container">
    <div id="date-display">
      <div id="duty-header">
        <span id="duty-label"></span>
        <span id="date"></span>
      </div>
      <div id="duty-names"></div>
      <div id="duty-next"></div>
    </div>
  </main>

  <div class="titlebar">
    <span class="titlebar-title">duty-board</span>
    <div class="titlebar-drag-area" data-tauri-drag-region></div>
    <div class="titlebar-controls">
      <!-- from tauri doc -->
      <button id="titlebar-minimize">
        <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24">
          <path fill="currentColor" d="M19 13H5v-2h14z" />
        </svg>
      </button>
      <button id="titlebar-close">
        <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24">
          <path fill="currentColor"
            d="M13.46 12L19 17.54V19h-1.46L12 13.46L6.46 19H5v-1.46L10.54 12L5 6.46V5h1.46L12 10.54L17.54 5H19v1.46z" />
        </svg>
      </button>
    </div>
  </div>
  </div>
</body>

</html>
