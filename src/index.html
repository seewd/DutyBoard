<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>值日看板</title>
  <script type="module" src="/main.ts" defer></script>
</head>

<body>
  <main>
    <header>
      <time class="weekday"></time>
      <time class="datetime"></time>
    </header>
    <section>
      <p class="duty-today"></p>
      <p class="duty-next"></p>
    </section>
  </main>

  <div id="titlebar" data-tauri-drag-region>
    <span id="title">duty-board</span>
    <menu>
      <button class="setting">
        <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24">
          <path fill="currentColor"
            d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .11-.63l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a7.027 7.027 0 0 0-1.62-.94l-.36-2.54A.5.5 0 0 0 14.54 2h-3.08a.5.5 0 0 0-.5.43l-.36 2.54a7.027 7.027 0 0 0-1.62.94l-2.39-.96a.5.5 0 0 0-.61.22L2.72 8.89a.5.5 0 0 0 .11.63l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.83 14.5a.5.5 0 0 0-.11.63l1.92 3.32c.14.24.42.34.68.22l2.39-.96c.5.39 1.05.71 1.62.94l.36 2.54c.05.27.28.46.55.46h3.08c.27 0 .5-.19.55-.46l.36-2.54c.57-.23 1.12-.55 1.62-.94l2.39.96c.26.12.54.02.68-.22l1.92-3.32a.5.5 0 0 0-.11-.63l-2.03-1.58zM12 15.5a3.5 3.5 0 1 1 0-7a3.5 3.5 0 0 1 0 7z" />
        </svg>
      </button>
      <button class="minimize">
        <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24">
          <path fill="currentColor" d="M19 13H5v-2h14z" />
        </svg>
      </button>
      <button class="close danger">
        <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24">
          <path fill="currentColor"
            d="M13.46 12L19 17.54V19h-1.46L12 13.46L6.46 19H5v-1.46L10.54 12L5 6.46V5h1.46L12 10.54L17.54 5H19v1.46z" />
        </svg>
      </button>
    </menu>
  </div>
</body>

</html>
